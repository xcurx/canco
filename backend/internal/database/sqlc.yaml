version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "../../../frontend/prisma/migrations/*/migration.sql"
    queries:
      - "queries/*.sql"
    gen:
      go:
        package: "sqlc"
        out: "sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
